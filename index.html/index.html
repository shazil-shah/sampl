  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Hotel Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Typing Effect Section -->
        <div id="typing-section" class="section active">
            <h1 id="typing-text"></h1>
            <div class="cursor"></div>
        </div>

        <!-- Question Section -->
        <div id="question-section" class="section">
            <h2 class="question">What you are willing to eat today?</h2>
            <div class="options">
                <button class="option-btn" data-category="proper">1. Proper Meal</button>
                <button class="option-btn" data-category="desserts">2. Desserts</button>
                <button class="option-btn" data-category="snacks">3. Light Snacks</button>
            </div>
        </div>

        <!-- Menu Items Section -->
        <div id="menu-section" class="section">
            <button id="back-btn" class="back-btn">← Back</button>
            <h2 id="category-title"></h2>
            <div id="menu-items" class="menu-grid"></div>
        </div>

        <!-- Contact Section -->
        <div id="contact-section" class="section">
            <h2>Order Now</h2>
            <p>Email: <a href="mailto:nanakanasahibpak@gmail.com">nanakanasahibpak@gmail.com</a></p>
            <p>Address: Your Given Address, Lahore, Pakistan</p>
            <button id="restart-btn" class="restart-btn">Restart Menu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
