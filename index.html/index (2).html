<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Feast - 3D Menu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Custom Cursor Effect -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- 3D Scene Container -->
    <div class="scene">
        
        <!-- Section 1: Intro / Typing -->
        <div class="screen intro-screen active" id="intro">
            <div class="content-box">
                <h1 class="typing-text"></h1>
                <p class="sub-text">Experience the taste of luxury.</p>
            </div>
        </div>

        <!-- Section 2: Category Selection -->
        <div class="screen category-screen" id="categories">
            <h2 class="question-text">What are you willing to eat today?</h2>
            <div class="options-container">
                <button class="option-btn" onclick="showMenu('meal')">Proper Meal</button>
                <button class="option-btn" onclick="showMenu('desert')">Delicious Desert</button>
                <button class="option-btn" onclick="showMenu('snacks')">Light Snacks</button>
            </div>
        </div>

        <!-- Section 3: Dynamic Menu Display -->
        <div class="screen menu-screen" id="menu-display">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2 class="menu-title" id="menu-title">Our Menu</h2>
            <div class="menu-grid" id="menu-grid">
                <!-- Items will be injected here by JavaScript -->
            </div>
        </div>

        <!-- Section 4: Footer / Contact -->
        <div class="footer" id="footer">
            <div class="contact-card">
                <h3>Contact Us</h3>
                <p>Email: <a href="mailto:nakananisahibpak@gmail.com">nakananisahibpak@gmail.com</a></p>
                <p>Address: 123 Gourmet Street, Food Valley, Your City</p>
                <p class="copyright">&copy; 2023 Your Hotel. All Rights Reserved.</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
