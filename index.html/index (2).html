<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nanakana · fresh pink & green 3D menu (exact dish photos)</title>
    <style>
        /* === CSS – unchanged, beautiful as before === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }
        .scene-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 30% 30%, #fff0f5, #e0f2e0);
        }
        .cube-grid {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateGrid 30s infinite linear;
        }
        .cube {
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(210, 240, 200, 0.25);
            border: 1px solid #b4e0b0;
            box-shadow: 0 0 30px rgba(255, 200, 220, 0.6), inset 0 0 20px rgba(255, 220, 240, 0.7);
            transform-style: preserve-3d;
            border-radius: 12px;
        }
        .cube::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 220, 230, 0.3);
            transform: rotateY(90deg) translateX(50%) translateZ(70px);
            border: 1px solid #ffb6c1;
            box-shadow: inset 0 0 30px #ffccdd;
        }
        .cube::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(220, 255, 210, 0.2);
            transform: rotateX(90deg) translateY(50%) translateZ(70px);
            border: 1px solid #a8e4a0;
        }
        .cube1 { top: 10%; left: 15%; animation: floatCube 16s infinite alternate; }
        .cube2 { top: 60%; left: 70%; width: 180px; height: 180px; animation: floatCube 20s infinite reverse; }
        .cube3 { top: 70%; left: 10%; width: 100px; height: 100px; animation: floatCube 14s infinite alternate-reverse; }
        .cube4 { top: 20%; left: 80%; width: 200px; height: 200px; animation: floatCube 22s infinite; }
        .cube5 { top: 40%; left: 40%; width: 250px; height: 250px; opacity: 0.5; animation: floatCube 25s infinite alternate; }
        @keyframes rotateGrid {
            0% { transform: rotateX(10deg) rotateY(0deg) rotateZ(0deg); }
            50% { transform: rotateX(15deg) rotateY(15deg) rotateZ(5deg); }
            100% { transform: rotateX(10deg) rotateY(30deg) rotateZ(0deg); }
        }
        @keyframes floatCube {
            0% { transform: translateZ(0px) translateY(0) rotate(0deg); }
            100% { transform: translateZ(80px) translateY(-20px) rotate(5deg); }
        }
        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            background: rgba(255, 250, 245, 0.7);
            backdrop-filter: blur(4px);
            color: #2d5a27;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 3rem;
            width: 100%;
        }
        .container {
            max-width: 1300px;
            width: 100%;
        }
        .hotel-name {
            font-size: clamp(2.2rem, 10vw, 4.3rem);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ff6b6b;
            text-shadow: 0 0 12px #ffb6c1, 2px 2px 10px #ffb6c1;
            margin-bottom: 0.8rem;
            border-right: 4px solid #ffb6c1;
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.8s step-end infinite;
        }
        @keyframes blinkCursor {
            0%, 100% { border-color: #ffb6c1; }
            50% { border-color: transparent; }
        }
        .question {
            font-size: 2.2rem;
            margin: 1.5rem 0 0.5rem;
            background: linear-gradient(45deg, #5f8b5a, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #c7f0c2, 0 0 35px #ffc0cb;
            animation: glowPulse 3s infinite, slideDown 1s ease;
            font-weight: 600;
        }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px #b4e8b0, 0 0 20px #ffb6c1; }
            50% { text-shadow: 0 0 25px #7fb07a, 0 0 45px #ffa0b5; }
            100% { text-shadow: 0 0 10px #b4e8b0, 0 0 20px #ffb6c1; }
        }
        .option-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 2.5rem 0 3rem;
        }
        .menu-option {
            background: #ffb6c1;
            border: none;
            padding: 1.3rem 2.8rem;
            font-size: 1.7rem;
            font-weight: bold;
            border-radius: 60px;
            color: #1f4f1a;
            box-shadow: 0 0 25px #ffb6c1, 0 10px 20px rgba(80, 120, 80, 0.3);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: scale(1);
            backdrop-filter: blur(2px);
            border: 2px solid #c1f0c0;
        }
        .menu-option:hover {
            box-shadow: 0 0 45px #ffb6c1, 0 0 90px #c1f0c0;
            transform: scale(1.08) translateY(-5px);
            background: #ffc0cb;
            color: #0f3f0a;
            border-color: #9fd69b;
        }
        .menu-option:active {
            transform: scale(0.97);
            box-shadow: 0 0 30px #ffb6c1;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
            padding: 1rem 0;
        }
        .food-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border: 2px solid #a8dba8;
            border-radius: 30px;
            padding: 1.2rem 0.8rem 1rem;
            text-align: center;
            box-shadow: 0 0 30px rgba(160, 210, 150, 0.5);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.5s ease forwards;
            opacity: 0;
            transform: scale(0.7);
            color: #1f4f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .food-card:nth-child(odd) { animation-delay: 0.05s; }
        .food-card:nth-child(even) { animation-delay: 0.1s; }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-3deg); }
            70% { transform: scale(1.05) rotate(0.5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
        .food-card:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 0 40px #b4e4b0, 0 15px 25px rgba(60, 100, 60, 0.2);
            border-color: #ffb6c1;
        }
        .food-card:active {
            transform: scale(0.98);
            transition: 0.05s;
            background: rgba(240, 255, 240, 0.95);
        }
        .food-card img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ffb6c1;
            box-shadow: 0 0 25px #c1f0c0;
            margin-bottom: 0.7rem;
            background: #f0faf0;
        }
        .food-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0.5rem 0 0.2rem;
            color: #1d4f1d;
        }
        .food-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2a7a2a;
            text-shadow: 0 0 20px #b4e8b0;
            letter-spacing: 2px;
        }
        .footer-info {
            margin-top: 3.5rem;
            border-top: 2px dashed #9fd69b;
            padding: 2rem 1rem;
            width: 100%;
            background: rgba(255, 240, 250, 0.7);
            border-radius: 50px 50px 0 0;
            text-align: center;
            font-size: 1.4rem;
            line-height: 2.3rem;
            box-shadow: 0 -10px 30px rgba(150, 200, 150, 0.3);
            color: #1b4c1b;
        }
        .footer-info a {
            color: #2a7a2a;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 3px dotted #ffb6c1;
        }
        .footer-info a:hover {
            color: #0a3f0a;
            border-bottom: 3px solid #7fb07a;
        }
        .address {
            color: #2d5a27;
            font-size: 1.3rem;
            background: rgba(255, 220, 230, 0.5);
            display: inline-block;
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            margin-top: 1rem;
            backdrop-filter: blur(3px);
            border: 1px solid #b4e4b0;
        }
        .menu-option, .food-card {
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(255, 182, 193, 0.7);
        }
        @media (max-width: 600px) {
            .hotel-name { font-size: 2.2rem; white-space: normal; border-right: none; animation: none; }
            .question { font-size: 1.8rem; }
            .menu-option { padding: 1rem 1.5rem; font-size: 1.3rem; }
            .food-card img { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="scene-3d">
        <div class="cube-grid">
            <div class="cube cube1"></div>
            <div class="cube cube2"></div>
            <div class="cube cube3"></div>
            <div class="cube cube4"></div>
            <div class="cube cube5"></div>
        </div>
    </div>

    <main>
        <div class="container">
            <h1 id="hotelName" class="hotel-name"></h1>
            <div id="questionDiv" class="question" style="display: none;">⚡ what you are willing to eat today? ⚡</div>
            <div id="optionButtons" class="option-panel" style="display: none;">
                <button class="menu-option" data-category="proper">🍽️ proper meal</button>
                <button class="menu-option" data-category="desserts">🍰 desserts</button>
                <button class="menu-option" data-category="snacks">🍿 lightly snacks</button>
            </div>
            <div id="itemsContainer" class="items-grid"></div>
            <div class="footer-info">
                📧 <a href="mailto:nanakanasahibpak@gmail.com">nanakanasahibpak@gmail.com</a><br>
                <span class="address">🏨 14-B, Blossom Avenue, Green Park, Mumbai · 400001</span>
            </div>
        </div>
    </main>

    <script>
        (function() {
            // ---------- FOOD DATA with exact Unsplash image links ----------
            const categoryData = {
                proper: [

                    { name: "Beef Steak", price: 24.50, img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400" },
                    { name: "Margherita Pizza", price: 10.30, img: "https://images.unsplash.com/photo-1548365328-9f547fb0953a?w=400" },
                    { name: "Spaghetti Bolognese", price: 14.25, img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400" },
                    { name: "Sushi Platter", price: 18.90, img: "https://images.unsplash.com/photo-1553621042-f6e147245754?w=400" },
                    { name: "Lamb Chops", price: 27.00, img: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=400" },
                    { name: "Caesar Salad", price: 9.45, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?w=400" },
                    { name: "Fish & Chips", price: 13.40, img: "https://images.unsplash.com/photo-1579631542720-3a87824fff86?w=400" },
                    { name: "Chicken Curry", price: 11.99, img: "https://images.unsplash.com/photo-1604908177522-402b8b9f3c3b?w=400" },
                    { name: "Vegetable Lasagna", price: 12.30, img: "https://images.unsplash.com/photo-1621996346565-e3dbc353d2e5?w=400" },
                    { name: "Burger & Fries", price: 10.95, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" },
                    { name: "Fried Rice", price: 8.90, img: "https://images.unsplash.com/photo-1604908554007-21f57b2b7e3a?w=400" },
                    { name: "Pad Thai", price: 13.20, img: "https://images.unsplash.com/photo-1553621042-ff27f7d6e0b9?w=400" },
                    { name: "Ribeye Steak", price: 29.90, img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400" },
                    { name: "Mushroom Risotto", price: 15.75, img: "https://images.unsplash.com/photo-1604908177197-0c9e4c839cdb?w=400" },
                    { name: "Chicken Wings", price: 11.50, img: "https://images.unsplash.com/photo-1608039755401-742074f0548d?w=400" },
                    { name: "Falafel Wrap", price: 9.80, img: "https://images.unsplash.com/photo-1598514983318-2f64f8f4796c?w=400" },
                    { name: "Lobster Bisque", price: 19.25, img: "https://images.unsplash.com/photo-1604908177030-2bb7d1cf8e0e?w=400" },
                    { name: "Tacos", price: 8.60, img: "https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=400" },
                    { name: "Dumplings", price: 7.90, img: "https://images.unsplash.com/photo-1546069901-eacef0df6022?w=400" }
                ],
                desserts: [
                    { name: "Chocolate Lava Cake", price: 7.50, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400" },
                    { name: "Tiramisu", price: 6.90, img: "https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400" },
                    { name: "Cheesecake", price: 6.25, img: "https://images.unsplash.com/photo-1505253216365-0cf3e2e64d9b?w=400" },
                    { name: "Ice Cream Sundae", price: 5.80, img: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400" },
                    { name: "Crème Brûlée", price: 8.20, img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400" },
                    { name: "Apple Pie", price: 5.50, img: "https://images.unsplash.com/photo-1605478900058-1a6a0b0a6f3c?w=400" },
                    { name: "Brownie", price: 4.90, img: "https://images.unsplash.com/photo-1586985289688-ca3cf47d3e6e?w=400" },
                    { name: "Macarons", price: 9.00, img: "https://images.unsplash.com/photo-1548943487-a2e4b5d58e63?w=400" },
                    { name: "Panna Cotta", price: 6.75, img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400" },
                    { name: "Fruit Tart", price: 7.20, img: "https://images.unsplash.com/photo-1519915028121-7d3463d5b1d1?w=400" }
                ],
                snacks: [
                    { name: "French Fries", price: 4.25, img: "https://images.unsplash.com/photo-1576107232684-1279f390859f?w=400" },
                    { name: "Nachos", price: 5.90, img: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=400" },
                    { name: "Spring Rolls", price: 4.80, img: "https://images.unsplash.com/photo-1605478889555-9c8a1b6b5f5c?w=400" },
                    { name: "Onion Rings", price: 4.50, img: "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?w=400" },
                    { name: "Mozzarella Sticks", price: 5.40, img: "https://images.unsplash.com/photo-1600891963935-cf8be9c8d8b3?w=400" },
                    { name: "Chicken Nuggets", price: 5.95, img: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=400" },
                    { name: "Samosa", price: 3.80, img: "https://images.unsplash.com/photo-1601050690597-df0568f70950?w=400" },
                    { name: "Bruschetta", price: 4.70, img: "https://images.unsplash.com/photo-1506280754576-f6fa8a873550?w=400" },
                    { name: "Garlic Bread", price: 3.90, img: "https://images.unsplash.com/photo-1604908177304-6a1a3e2c0b78?w=400" },
                    { name: "Popcorn", price: 3.50, img: "https://images.unsplash.com/photo-1587049352851-8d4e89133924?w=400" }
                ]
            };

            // ----- CUSTOM FOOD PLACEHOLDER (SVG) – just in case any image fails -----
            function getFoodPlaceholderSVG() {
                return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23ffd9e6' stroke='%23a8dba8' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='30' fill='white' stroke='%23ffb6c1' stroke-width='2'/%3E%3Cpath d='M35 40 L30 70 M40 40 L35 70 M55 40 L60 70 M65 40 L70 70' stroke='%23a8dba8' stroke-width='4' stroke-linecap='round' /%3E%3Ccircle cx='50' cy='45' r='8' fill='%23ffb6c1' opacity='0.5' /%3E%3Ctext x='50' y='82' font-size='12' text-anchor='middle' fill='%23336633' font-family='Arial'%3E🍽️%3C/text%3E%3C/svg%3E";
            }

            // ----- DOM elements -----
            const hotelEl = document.getElementById('hotelName');
            const questionEl = document.getElementById('questionDiv');
            const optionDiv = document.getElementById('optionButtons');
            const itemsContainer = document.getElementById('itemsContainer');

            // ----- typing effect for hotel name -----
            const hotelFullName = "NANAKANA PALACE 🌸🌿";
            let i = 0;
            function typeWriter() {
                if (i < hotelFullName.length) {
                    hotelEl.innerHTML += hotelFullName.charAt(i);
                    i++;
                    setTimeout(typeWriter, 120);
                } else {
                    setTimeout(() => {
                        questionEl.style.display = 'block';
                    }, 400);
                    setTimeout(() => {
                        optionDiv.style.display = 'flex';
                        optionDiv.style.animation = 'glowPulse 2s';
                    }, 800);
                }
            }
            typeWriter();

            // ----- render items with direct image links -----
            function renderItems(categoryKey) {
                const items = categoryData[categoryKey];
                if (!items) return;
                itemsContainer.style.opacity = '0';
                setTimeout(() => {
                    itemsContainer.innerHTML = ''; 
                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'food-card';
                        const img = document.createElement('img');
                        img.src = item.img;
                        img.alt = item.name;
                        img.loading = 'lazy';
                        // Fallback if image fails to load (e.g., Unsplash down)
                        img.onerror = function() {
                            this.onerror = null;
                            this.src = getFoodPlaceholderSVG();
                        };
                        card.appendChild(img);
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'food-name';
                        nameDiv.textContent = item.name;
                        card.appendChild(nameDiv);
                        const priceDiv = document.createElement('div');
                        priceDiv.className = 'food-price';
                        priceDiv.textContent = `$${item.price.toFixed(2)}`;
                        card.appendChild(priceDiv);
                        itemsContainer.appendChild(card);
                    });
                    itemsContainer.style.opacity = '1';
                }, 150);
            }

            // ----- add event listeners to option buttons -----
            const buttons = document.querySelectorAll('.menu-option');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const category = btn.getAttribute('data-category');
                    renderItems(category);
                    if (navigator.vibrate) navigator.vibrate(20); // subtle hand effect
                });
            });

            // hand effect for mobile (touch feedback)
            document.querySelectorAll('.food-card, .menu-option').forEach(el => {
                el.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.98)';
                }, { passive: true });
                el.addEventListener('touchend', function() {
                    this.style.transform = '';
                });
            });
        })();
    </script>
</body>
</html>
